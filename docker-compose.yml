services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agent_brain
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agent_brain"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "HTTP_PROXY= HTTPS_PROXY= http_proxy= https_proxy= ollama list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        # Wait for Ollama to be ready (curl not available in image; use ollama list with explicit host)
        until OLLAMA_HOST=http://localhost:11434 ollama list > /dev/null 2>&1; do
          echo "Waiting for Ollama to start..."
          sleep 1
        done
        echo "Ollama is ready. Pulling nomic-embed-text..."
        OLLAMA_HOST=http://localhost:11434 ollama pull nomic-embed-text
        echo "Model pulled. Ollama is ready for embeddings."
        wait

volumes:
  pgdata:
  ollama_data:
